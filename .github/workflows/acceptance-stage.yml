name: acceptance-stage

on:
  schedule:
    - cron: '*/30 * * * *'  # Run every 30 minutes
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run (even if no new images)'
        required: false
        default: false
        type: boolean

jobs:

  find-latest-images:
    runs-on: ubuntu-latest
    outputs:
      image-digest-urls: ${{ steps.get-digest.outputs.image-digest-urls }}
      latest-image-timestamp: ${{ steps.get-digest.outputs.latest-image-timestamp }}

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Latest Docker Digests
        id: get-digest
        uses: optivem/find-latest-docker-images-action@v1
        with:
          image-urls: |
            ghcr.io/${{ github.repository_owner }}/eshop/frontend:latest
            ghcr.io/${{ github.repository_owner }}/eshop/backend:latest

  should-run:
    needs: find-latest-images
    if: needs.find-latest-images.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Should Run Acceptance Stage
        id: check
        uses: optivem/should-run-acceptance-stage-action@v1
        with:
          latest-image-timestamp: ${{ needs.find-latest-images.outputs.latest-image-timestamp }}
          force-run: ${{ inputs.force_run == true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  system-test:
    needs: [ should-run, find-latest-images ]
    if: needs.should-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy System (Real External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.find-latest-images.outputs.image-digest-urls }}
          external-system-mode: 'real'
          frontend-url: 'http://localhost:3001/'
          backend-url: 'http://localhost:8081/health'
          erp-url: 'http://localhost:9001/erp/health'
          tax-url: 'http://localhost:9001/tax/health'

      - name: Deploy System (Stub External Systems)
        uses: ./.github/actions/deploy-docker-images
        with:
          environment: acceptance
          version: latest
          image-urls: ${{ needs.find-latest-images.outputs.image-digest-urls }}
          external-system-mode: 'stub'
          frontend-url: 'http://localhost:3002/'
          backend-url: 'http://localhost:8082/health'
          erp-url: 'http://localhost:9002/erp/health'
          tax-url: 'http://localhost:9002/tax/health'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Playwright Dependencies
        run: npx playwright install --with-deps chromium

      - name: Make Gradle Wrapper executable
        run: chmod +x ./gradlew

      - name: Build Project
        run: ./gradlew clean compileJava compileTestJava

      # === v1 ===
      - name: v1 - Smoke
        run: ./gradlew :system-test:test -Dversion=v1 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance

      - name: v1 - E2E
        run: ./gradlew :system-test:test -Dversion=v1 -Dtype=e2e -Denvironment=acceptance

      # === v2 ===
      - name: v2 - Smoke
        run: ./gradlew :system-test:test -Dversion=v2 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance

      - name: v2 - E2E
        run: ./gradlew :system-test:test -Dversion=v2 -Dtype=e2e -Denvironment=acceptance

      # === v3 ===
      - name: v3 - Smoke
        run: ./gradlew :system-test:test -Dversion=v3 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance

      - name: v3 - E2E
        run: ./gradlew :system-test:test -Dversion=v3 -Dtype=e2e -Denvironment=acceptance

      # === v4 ===
      - name: v4 - Smoke
        run: ./gradlew :system-test:test -Dversion=v4 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance

      - name: v4 - E2E - API Channel
        run: ./gradlew :system-test:test -Dversion=v4 -Dtype=e2e -Dchannel=API -Denvironment=acceptance

      - name: v4 - E2E - UI Channel
        run: ./gradlew :system-test:test -Dversion=v4 -Dtype=e2e -Dchannel=UI -Denvironment=acceptance

      # === v5 ===
      - name: v5 - Smoke (real)
        run: ./gradlew :system-test:test -Dversion=v5 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance

      - name: v5 - E2E - API Channel
        run: ./gradlew :system-test:test -Dversion=v5 -Dtype=e2e -Dchannel=API -Denvironment=acceptance

      - name: v5 - E2E - UI Channel
        run: ./gradlew :system-test:test -Dversion=v5 -Dtype=e2e -Dchannel=UI -Denvironment=acceptance

      # === v6 ===
      - name: v6 - Smoke
        run: ./gradlew :system-test:test -Dversion=v6 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance

      - name: v6 - E2E - API Channel
        run: ./gradlew :system-test:test -Dversion=v6 -Dtype=e2e -Dchannel=API -Denvironment=acceptance

      - name: v6 - E2E - UI Channel
        run: ./gradlew :system-test:test -Dversion=v6 -Dtype=e2e -Dchannel=UI -Denvironment=acceptance

      # === v7 ===
      - name: v7 - Smoke (Stub)
        run: ./gradlew :system-test:test -Dversion=v7 -Dtype=smoke -DexternalSystemMode=stub -Denvironment=acceptance

      - name: v7 - Smoke (Real)
        run: ./gradlew :system-test:test -Dversion=v7 -Dtype=smoke -DexternalSystemMode=real -Denvironment=acceptance

      - name: v7 - Acceptance - API Channel
        run: ./gradlew :system-test:test -Dversion=v7 -Dtype=acceptance -DexcludeTags=isolated -Dchannel=API -Denvironment=acceptance

      - name: v7 - Acceptance - UI Channel
        run: ./gradlew :system-test:test -Dversion=v7 -Dtype=acceptance -DexcludeTags=isolated -Dchannel=UI -Denvironment=acceptance

      - name: v7 - Acceptance (Isolated) - API Channel
        run: ./gradlew :system-test:test -Dversion=v7 -Dtype=acceptance -DincludeTags=isolated -Dchannel=API -Denvironment=acceptance

      - name: v7 - Acceptance (Isolated) - UI Channel
        run: ./gradlew :system-test:test -Dversion=v7 -Dtype=acceptance -DincludeTags=isolated -Dchannel=UI -Denvironment=acceptance

      - name: v7 - Contract (Stub)
        run: ./gradlew :system-test:test -Dversion=v7 -Dtype=contract -DexternalSystemMode=stub -Denvironment=acceptance

      - name: v7 - Contract (Real)
        run: ./gradlew :system-test:test -Dversion=v7 -Dtype=contract -DexternalSystemMode=real -Denvironment=acceptance

      - name: v7 - E2E - API Channel
        run: ./gradlew :system-test:test -Dversion=v7 -Dtype=e2e -Dchannel=API -Denvironment=acceptance

      - name: v7 - E2E - UI Channel
        run: ./gradlew :system-test:test -Dversion=v7 -Dtype=e2e -Dchannel=UI -Denvironment=acceptance
